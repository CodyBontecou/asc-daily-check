name: Monthly Sales Report

on:
  schedule:
    # 8:10 AM PST on the 2nd of every month = 16:10 UTC
    # (2nd to ensure all data from previous month is available)
    - cron: '10 16 2 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Month to report (YYYY-MM or "last")'
        required: false
        default: 'last'

jobs:
  monthly-report:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install asc CLI
        run: npm install -g @mariozechner/asc

      - name: Configure ASC credentials
        run: |
          mkdir -p ~/.asc
          echo '${{ secrets.ASC_API_KEY }}' > ~/.asc/api-key.p8
          cat > ~/.asc/config.json << EOF
          {
            "keyId": "${{ secrets.ASC_KEY_ID }}",
            "issuerId": "${{ secrets.ASC_ISSUER_ID }}",
            "privateKeyPath": "~/.asc/api-key.p8"
          }
          EOF

      - name: Create config.json
        run: |
          cat > config.json << EOF
          {
            "asc": {
              "vendorNumber": "${{ secrets.ASC_VENDOR_NUMBER }}"
            },
            "postBridge": {
              "apiKey": "${{ secrets.POST_BRIDGE_API_KEY }}"
            }
          }
          EOF

      - name: Generate monthly report
        id: report
        run: |
          MONTH="${{ github.event.inputs.month || 'last' }}"
          echo "Generating report for month: $MONTH"
          
          # Generate JSON report
          node daily-sales.js --month "$MONTH" --json > monthly-report.json 2>fetch.log
          cat fetch.log
          
          # Output summary
          echo "## Monthly Report" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat monthly-report.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        env:
          ASC_VENDOR_NUMBER: ${{ secrets.ASC_VENDOR_NUMBER }}

      - name: Post to social platforms
        if: success()
        run: |
          MONTH="${{ github.event.inputs.month || 'last' }}"
          node daily-sales.js --month "$MONTH" --post --account ${{ secrets.POST_BRIDGE_ACCOUNT_IDS }}
        env:
          ASC_VENDOR_NUMBER: ${{ secrets.ASC_VENDOR_NUMBER }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: monthly-report
          path: monthly-report.json
          retention-days: 90
